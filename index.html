<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Управление захватом</title>
<style>
  body { font-family: Arial, sans-serif; max-width: 600px; margin: 20px auto; padding: 0 16px; color: #222; }
  h1 { font-size: 22px; }
  h2 { font-size: 16px; margin-top: 24px; border-bottom: 1px solid #ccc; padding-bottom: 4px; }
  button { font-size: 15px; padding: 8px 16px; margin: 4px 4px 4px 0; border: 1px solid #888; border-radius: 6px; background: #f0f0f0; cursor: pointer; }
  button:hover { background: #e2e2e2; }
  #slider { width: 100%; }
  .status { border: 1px solid #ccc; border-radius: 6px; padding: 12px; background: #fafafa; }
  .status p { margin: 6px 0; }
  .bar { height: 18px; background: #ddd; border-radius: 9px; overflow: hidden; margin-top: 8px; }
  .bar > div { height: 100%; background: #4a90d9; width: 100%; transition: width 0.3s; }
  .view { text-align: center; }
  svg { background: #fff; border: 1px solid #ccc; border-radius: 6px; }
</style>
</head>
<body>

<h1>Трёхпалый самоцентрирующийся захват</h1>
<p>Управление через сервер. Состояние хранится на сервере.</p>

<h2>Вид сверху</h2>
<div class="view">
  <svg id="grip" width="280" height="280" viewBox="0 0 280 280">
    <circle cx="140" cy="140" r="40" fill="#bbb" stroke="#888" stroke-width="2"/>
    <circle cx="140" cy="140" r="16" fill="#777" stroke="#555" stroke-width="2"/>
    <circle id="object" cx="140" cy="140" r="22" fill="#4a90d9" stroke="#2c6cb0" stroke-width="2"/>
    <g id="jaws"></g>
  </svg>
</div>

<h2>Команды</h2>
<button onclick="cmd('/grip')">Сжать</button>
<button onclick="cmd('/release')">Разжать</button>
<button onclick="cmd('/stop')">Стоп</button>

<h2>Раскрытие (%)</h2>
<input type="range" id="slider" min="0" max="100" value="100" onchange="setPercent(this.value)">
<span id="sliderVal">100</span>%
<br>
<button onclick="setPercent(document.getElementById('slider').value)">Применить</button>

<h2>Статус</h2>
<div class="status">
  <p>Раскрытие: <b id="percent">—</b> %</p>
  <p>Зазор между губками: <b id="gap">—</b> мм</p>
  <p>Состояние: <b id="status">—</b></p>
  <p>Двигатель крутится: <b id="moving">—</b></p>
  <div class="bar"><div id="barFill"></div></div>
</div>

<script>
var cx = 140, cy = 140;
var rMin = 30, rMax = 95;

function buildJaws() {
  var g = document.getElementById('jaws');
  var angles = [90, 210, 330];
  for (var i = 0; i < 3; i++) {
    var rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('width', 26);
    rect.setAttribute('height', 40);
    rect.setAttribute('rx', 4);
    rect.setAttribute('fill', '#555');
    rect.setAttribute('data-angle', angles[i]);
    g.appendChild(rect);
  }
}

function drawJaws(percent) {
  var jaws = document.getElementById('jaws').children;
  var r = rMin + (rMax - rMin) * percent / 100;
  for (var i = 0; i < jaws.length; i++) {
    var a = jaws[i].getAttribute('data-angle') * Math.PI / 180;
    var x = cx + r * Math.cos(a);
    var y = cy - r * Math.sin(a);
    jaws[i].setAttribute('x', x - 13);
    jaws[i].setAttribute('y', y - 20);
    jaws[i].setAttribute('transform', 'rotate(' + (-jaws[i].getAttribute('data-angle') + 90) + ' ' + x + ' ' + y + ')');
  }
  var objR = 10 + 18 * percent / 100;
  document.getElementById('object').setAttribute('r', objR);
}

document.getElementById('slider').addEventListener('input', function () {
  document.getElementById('sliderVal').textContent = this.value;
});

function cmd(url) { fetch(url).then(r => r.json()).then(show); }
function setPercent(p) { fetch('/set?percent=' + p).then(r => r.json()).then(show); }

function show(s) {
  document.getElementById('percent').textContent = s.percent;
  document.getElementById('gap').textContent = s.gap_mm;
  document.getElementById('status').textContent = s.status;
  document.getElementById('moving').textContent = s.moving ? 'да' : 'нет';
  document.getElementById('barFill').style.width = s.percent + '%';
  drawJaws(s.percent);
}

function poll() { fetch('/status').then(r => r.json()).then(show); }

buildJaws();
setInterval(poll, 1000);
poll();
</script>

</body>
</html>
